name: "cyber-ops-v1"
version: "1.0.0"
description: "Real-world SecOps terminal tasks for agentic AI evaluation."
entrypoint: "main:app"
observation_space: "Observation"
action_space: "Action"
tasks:
  - name: "log-analysis"
    difficulty: "easy"
    description: "Identify the attacker IP in /var/log/auth.log"
  - name: "process-hunt"
    difficulty: "medium"
    description: "Find and kill the malicious PID for './hidden_miner'"
  - name: "perm-fix"
    difficulty: "hard"
    description: "Secure world-writable files in /etc to 644"
endpoints:
  reset: "/reset"
  step: "/step"
  state: "/state"